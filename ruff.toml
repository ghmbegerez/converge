target-version = "py312"
line-length = 120

[lint]
select = [
    "E",     # pycodestyle errors
    "W",     # pycodestyle warnings
    "F",     # pyflakes
    "I",     # isort
    "UP",    # pyupgrade
    "B",     # flake8-bugbear
    "S",     # flake8-bandit (security)
    "T20",   # flake8-print
]
ignore = [
    "S101",  # assert — fine in tests
    "S603",  # subprocess without shell=True — intentional
    "S607",  # starting a process with a partial path — intentional (git)
    "E501",  # line too long — formatter handles this
]

[lint.per-file-ignores]
"tests/**" = ["S101", "T20", "S105", "S106"]

[format]
quote-style = "double"
